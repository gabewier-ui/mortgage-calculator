<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgage Payment & Interest Comparison Tool</title>
  <meta name="description" content="Compare mortgage rates and see total interest paid. Simple loan comparison calculator to understand real cost differences.">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
      background-color: #f8f8f8;
    }
    h1 {
      text-align: center;
    }
    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
    .result {
      margin-top: 15px;
      font-weight: bold;
      line-height: 1.6;
    }
    .big {
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>Mortgage Comparison Tool</h1>

<div class="card">
  <label>Loan Amount ($)</label>
  <input type="number" id="loan" value="250000">

  <label>Interest Rate 1 (%)</label>
  <input type="number" id="rate1" value="6" step="0.01">

  <label>Interest Rate 2 (%)</label>
  <input type="number" id="rate2" value="7.75" step="0.01">

  <label>Loan Term (years)</label>
  <input type="number" id="years" value="30">

  <button onclick="calculate()">Compare</button>

  <div class="result" id="output"></div>
</div>

<div class="card">
  <h2>Why This Matters</h2>
  <p>
    Small interest rate differences can cost tens of thousands of dollars over the life of a loan.
    This tool shows the real total cost, not just the monthly payment.
  </p>
</div>

<script>
function calculate() {
  const loan = parseFloat(document.getElementById('loan').value);
  const rate1 = parseFloat(document.getElementById('rate1').value) / 100 / 12;
  const rate2 = parseFloat(document.getElementById('rate2').value) / 100 / 12;
  const years = parseFloat(document.getElementById('years').value);
  const months = years * 12;

  function totalPaid(rate) {
    const monthly = loan * rate / (1 - Math.pow(1 + rate, -months));
    return monthly * months;
  }

  const total1 = totalPaid(rate1);
  const total2 = totalPaid(rate2);
  const difference = total2 - total1;

  document.getElementById('output').innerHTML =
    "<span class='big'>Total Paid at Rate 1:</span> $" + total1.toFixed(0) + "<br>" +
    "<span class='big'>Total Paid at Rate 2:</span> $" + total2.toFixed(0) + "<br><br>" +
    "<span class='big'>Difference in Total Cost:</span> $" + difference.toFixed(0);
}
</script>

</body>
</html>
